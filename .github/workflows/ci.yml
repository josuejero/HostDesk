# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    name: Run lint, unit, integration, and e2e tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: docker compose up -d --build
      - name: Wait for API health
        run: |
          for i in {1..30}; do
            curl --fail http://127.0.0.1:8080/api/health && exit 0
            sleep 2
          done
          docker compose logs api mysql
          exit 1
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      - run: npm run test:coverage
      - run: npm run test:api
        env:
          HOSTDESK_API_BASE_URL: http://127.0.0.1:8080
      - run: npx playwright install --with-deps
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            metrics/reports/playwright
            metrics/reports/playwright-results
          retention-days: 14
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: metrics/reports/coverage
          retention-days: 14
      - if: always()
        run: docker compose down
