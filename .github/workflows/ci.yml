# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Run lint, unit, integration, and e2e tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run data:validate
      - run: docker compose up -d --build
      - name: Wait for API health
        run: |
          for i in {1..30}; do
            curl --fail http://127.0.0.1:8080/api/health && exit 0
            sleep 2
          done
          docker compose logs api mysql
          exit 1
      - name: PHP syntax check
        run: docker compose exec -T api sh -lc "find /app/api -name '*.php' -print0 | xargs -0 -n1 php -l"
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      - run: npm run test:coverage
      - run: npm run test:api
        env:
          HOSTDESK_API_BASE_URL: http://127.0.0.1:8080
      - run: npx playwright install --with-deps
      - run: npm run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            metrics/reports/playwright
            metrics/reports/playwright-results
          retention-days: 14
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: metrics/reports/coverage
          retention-days: 14
      - if: always()
        run: docker compose down
