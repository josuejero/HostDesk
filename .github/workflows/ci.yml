# .github/workflows/ci.yml
name: CI

on:
  pull_request:
    branches: ["master"] # or ["master"], but match deploy + your actual branch
  push: {}

jobs:
  build:
    name: Run lint, unit, integration, and e2e tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npx playwright install --with-deps
      - run: npm run test:e2e
